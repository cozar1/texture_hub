{% extends "template.html" %}
{% block content %}

<!-- Main Layout -->
<div class="main">

    <!-- Sidebar -->
    <aside class="sidebar">
        <form class="home-filters" method="get" action="/">
            <div class="home-filters__row">
                <label class="home-filters__label" for="filter-name">Name</label>
                <input id="filter-name" class="home-filters__input" type="text" placeholder="e.g. bricks" name="name" value="{{ (filters.name if filters else '') }}">
            </div>
            <div class="home-filters__row">
                <label class="home-filters__label" for="filter-user">Uploader</label>
                <input id="filter-user" class="home-filters__input" type="text" placeholder="e.g. alice" name="user" value="{{ (filters.user if filters else '') }}">
            </div>
            <div class="home-filters__actions">
                <input type="submit" value="Search">
                <a class="home-filters__clear" href="/">Clear</a>
            </div>
            <div class="home-filters__meta">
                <span>{{ result_count or 0 }} results</span>
            </div>
        </form>
    </aside>

    <!-- Content -->
    <section class="content">
        <div class="texture-grid">
            {% for texture in textures %}
            <a href="/texture/{{texture.texture_id}}">
                <div class="texture-card">
                    <img src="{{ texture.texture_address | texture_url }}" alt="">
                    <p>{{texture.texture_name}}</p>
                </div>
            </a>
            {% endfor %}
            {% if not textures %}
                <div class="home-empty">
                    <div class="home-empty__title">No textures match your filters.</div>
                    <div class="home-empty__hint">Try clearing the filters or searching for a shorter term.</div>
                </div>
            {% endif %}
        </div>
    </section>

</div>

{% endblock %}
