{% extends "template.html" %}
{% block content %}

<!-- Main Layout -->
<div class="main">

    <!-- Sidebar -->
    <aside class="sidebar">
    </aside>

    <!-- Content -->
    <section class="content">
        <div class="texture-grid">
            {% for texture in textures %}
            <div class="texture-card">
                <img src="{{ texture.texture_address | texture_url }}" alt="">
                <p>{{texture.texture_name}}</p>
            </div>
            {% endfor %}
        </div>
    </section>

</div>

{% endblock %}
