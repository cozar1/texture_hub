<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>{% block title %}Texture Hub{% endblock %}</title>
</head>
<body>
    {% if request.endpoint not in ('login', 'signup') %}
    <!-- Top Bar -->
    <header class="topbar">
        <a href="/" class="logo">TEXTURE HUB</a>

        <nav class="nav">
            <a href="/0" class="nav-btn {% if request.path == '/' %}nav-btn--active{% endif %}">TEXTURES</a>
            <a href="/1" class="nav-btn {% if request.path == '/collections' %}nav-btn--active{% endif %}">COLLECTIONS</a>
        </nav>

        <nav class="auth">
            {% if user %}
                <a href="/upload">UPLOAD</a>
                <a class="dropbtn" href="/user/{{ user.user_name }}">{{ user.user_name }}</a>
                <div class="dropdown-content">
                    <a href="/logout">Log Out</a>
                </div>
            {% else %}
                <a href="/login">LOGIN</a>
                <a href="/signup">SIGNUP</a>
            {% endif %}
        </nav>
    </header>
    {% endif %}
    {% block content %}
    {% endblock %}
</body>
</html>
